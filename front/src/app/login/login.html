<!-- pages/auth/login/login.component.html -->
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <svg width="48" height="48" viewBox="0 0 40 40" fill="none">
        <path d="M20 4 L36 32 L4 32 Z" stroke="#c8923a" stroke-width="2" fill="none"/>
        <path d="M14 24 L26 24" stroke="#c8923a" stroke-width="1.5"/>
      </svg>
      <h1>Ama Dablam <span>Coffee</span></h1>
      <p>Accede a tu cuenta</p>
    </div>

    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="admin@cafe.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <p class="login-back">
      <a routerLink="/">← Volver a la tienda</a>
    </p>
  </div>
</div>
