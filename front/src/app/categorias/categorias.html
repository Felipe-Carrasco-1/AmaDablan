<!-- pages/admin/categorias/categorias.component.html -->
<div class="admin-page">
  <div class="page-header">
    <div>
      <h2>Gestión de Categorías</h2>
      <p class="text-muted">{{ categorias.length }} categorías registradas</p>
    </div>
    <button class="btn btn-primary" (click)="openModal()">+ Nueva Categoría</button>
  </div>

  <div class="alert alert-success" *ngIf="successMsg">{{ successMsg }}</div>

  <div class="card table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Productos</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of categorias">
          <td>{{ c.id }}</td>
          <td><strong>{{ c.nombre }}</strong></td>
          <td>{{ c.total_productos }}</td>
          <td>
            <span class="badge" [class.badge-success]="c.estado" [class.badge-danger]="!c.estado">
              {{ c.estado ? 'Activa' : 'Inactiva' }}
            </span>
          </td>
          <td>
            <div class="action-btns">
              <button class="btn btn-sm btn-secondary" (click)="openModal(c)">✏️</button>
              <button class="btn btn-sm" style="background:var(--brown-warm);color:var(--text-muted)"
                      (click)="toggleEstado(c)">
                {{ c.estado ? '🔒 Desactivar' : '🔓 Activar' }}
              </button>
              <button class="btn btn-sm btn-danger" (click)="eliminar(c)">🗑️</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ editando ? 'Editar Categoría' : 'Nueva Categoría' }}</h3>
      <button class="modal-close" (click)="closeModal()">×</button>
    </div>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
    <form (ngSubmit)="guardar()">
      <div class="form-group">
        <label>Nombre *</label>
        <input class="form-control" type="text" [(ngModel)]="form.nombre" name="nombre" required />
      </div>
      <div class="form-check mt-2">
        <input type="checkbox" id="est" [(ngModel)]="form.estado" name="estado" />
        <label for="est">Activa</label>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Guardando...' : (editando ? 'Actualizar' : 'Crear') }}
        </button>
      </div>
    </form>
  </div>
</div>
